[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "false"
PUPPETEER_CACHE_DIR = "/app/.cache/puppeteer"
NODE_ENV = "production"

# Explicitly list only the system libraries Chrome needs.
# This overrides nixpacks' auto-detection which would otherwise
# try to install the full `chromium` apt package — Puppeteer
# uses its own bundled Chrome binary instead.
[phases.setup]
aptPkgs = [
  "ca-certificates",
  "fonts-liberation",
  "libasound2",
  "libatk-bridge2.0-0",
  "libatk1.0-0",
  "libcups2",
  "libdbus-1-3",
  "libdrm2",
  "libgbm1",
  "libgtk-3-0",
  "libnspr4",
  "libnss3",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxkbcommon0",
  "libxrandr2",
  "xdg-utils"
]

[phases.install]
cmds = ["npm install"]

[start]
cmd = "node index.js"
